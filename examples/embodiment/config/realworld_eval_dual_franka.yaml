defaults:
  - env/realworld_franka_joint_dual@env.train
  - env/realworld_franka_joint_dual@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: franka
      placement: 0
    rollout:
      node_group: franka
      placement: 0
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0-1
      # actor/rollout/env (placement: 0 → node0) run under .venv-openpi;
      # FrankyController falls under default "cluster" group → keeps node-local .venv.
      env_configs:
        - node_ranks: 0
          python_interpreter_path: /home/i-yinuo/cynws/RLinf/.venv-openpi/bin/python
      hardware:
        type: DualFranka
        configs:
          - left_robot_ip: "172.16.0.2"
            right_robot_ip: "172.16.0.2"
            base_camera_serials:
              - "941322072906"
            base_camera_type: realsense
            left_camera_serials:
              - "usb-XVisio_Technology_XVisio_vSLAM_250801DR48FB26001218-video-index0"
            left_camera_type: lumos
            right_camera_serials:
              - "usb-XVisio_Technology_XVisio_vSLAM_250801DR48FB26001173-video-index0"
            right_camera_type: lumos
            left_gripper_type: robotiq
            right_gripper_type: robotiq
            left_gripper_connection: "/dev/serial/by-id/usb-FTDI_USB_TO_RS-485_DAAIT8PU-if00-port0"
            right_gripper_connection: "/dev/serial/by-id/usb-FTDI_USB_TO_RS-485_DAAIR00N-if00-port0"
            left_controller_node_rank: 0
            right_controller_node_rank: 1
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: dual-franka-openpi
    experiment_name: "realworld-eval-dual-franka"
    wandb_entity: striding-algo
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1

algorithm:
  update_epoch: 1
  group_size: 1
  eval_rollout_epoch: 1
  adv_type: gae
  loss_type: actor  # eval-only; any non-critic loss avoids the value-head assertion
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  eval:
    # Disable GELLO teleop intervention for autonomous policy rollout.
    use_gello_joint: False
    use_gello: False
    use_spacemouse: False
    # No keyboard-gated recording during eval — just let the policy act.
    keyboard_reward_wrapper: null
    max_episode_steps: 300
    override_cfg:
      task_description: "pick up the cylinder with the left hand, hand it over to the right hand, and place it on the plate"
      # SFT model outputs absolute TCP-pose target [xyz(3), rot6d(6), grip(1)]
      # per arm (20-d total, matches Dual-franka-rot6d dataset). With
      # "tcp_rot6d_waypoint" mode, the whole 20-step chunk is pre-submitted
      # per arm as one franky CartesianWaypointMotion (Ruckig blends through
      # waypoints); observation is auto-switched to the matching rot6d
      # proprio layout. Use "tcp_rot6d_per_step" instead if you want every
      # env.step to dispatch its own CartesianMotion.
      joint_action_mode: "tcp_rot6d_waypoint"
      teleop_direct_stream: false  # env.step owns motion
      # Autonomous reset starts from the training-data first-frame joint
      # distribution so the policy's initial obs is in-distribution. Values
      # are per-joint means over 21 collected episodes (see
      # logs/20260417-17:57:23/collected_data/rank_0/id_0/data/chunk-000/).
      joint_reset_qpos:
        - [0.014, 0.118, -0.430, -1.604, 0.166, 2.273, -0.090]
        - [-0.437, 0.190, 0.681, -1.582, 0.086, 1.987, -0.476]
      target_ee_pose:
        - [0.5, -0.2, 0.4, -3.14, 0.0, 0.0]
        - [0.5,  0.2, 0.4, -3.14, 0.0, 0.0]
      reset_ee_pose:
        - [0.5, -0.2, 0.5, -3.14, 0.0, 0.0]
        - [0.5,  0.2, 0.5, -3.14, 0.0, 0.0]
      success_hold_steps: 1

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  sync_weight_nccl_max_ctas: 32
  model:
    model_path: /home/i-yinuo/models/dual_franka/tcp_v1_14500/  # TCP-pose SFT: /mnt/public1/chenyinuo/RLinf/logs/20260420-21:38:46/dual_franka_tcp_v1/checkpoints/global_step_14500
    precision: ${actor.model.precision}

critic:
  use_critic_model: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: False
  model:
    model_path: ${rollout.model.model_path}
    precision: null
    num_action_chunks: 20          # matches SFT action_horizon
    action_dim: 20                 # dual-franka rot6d: [L_xyz, L_rot6d, L_grip, R_xyz, R_rot6d, R_grip]
    add_value_head: False
    openpi:
      config_name: "pi05_dualfranka_rot6d"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}
