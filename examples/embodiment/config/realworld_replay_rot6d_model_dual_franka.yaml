defaults:
  - env/realworld_franka_rot6d_dual@env.eval
  - model/pi0_5@actor.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# Dataset-obs-driven model replay. Per dataset frame ``t``, the SFT ckpt is
# fed (image[t], state[t]) and the first action of its predicted 20-step
# chunk is dispatched through FrankyController. Isolates "model output bad"
# (model + ideal obs → bad action) from "live cameras / state distribution
# shift" (real cameras differ from dataset cameras enough to push model OOD).
#
# Usage:
#   bash replay_data.sh realworld_replay_rot6d_model_dual_franka \
#       replay.episode_index=60
#
replay:
  dataset_root: /home/i-yinuo/cynws/RLinf/logs/merged_dual_franka_cylinder_handover_20260428
  episode_index: 60
  fps: 10
  start_frame: 0
  max_frames: null
  log_every: 20
  target_source: model
  prealign_reset: true
  dump_compare_dir: null
  dump_every: 1
  model_inference_batch_size: 4
  model_device: cuda:0

cluster:
  num_nodes: 2
  component_placement:
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0-1
      env_configs:
        - node_ranks: 0
          python_interpreter_path: /home/i-yinuo/cynws/RLinf/.venv-openpi/bin/python
      hardware:
        type: DualFranka
        configs:
          - left_robot_ip: "172.16.0.2"
            right_robot_ip: "172.16.0.2"
            base_camera_serials:
              - "941322072906"
            base_camera_type: realsense
            left_camera_serials:
              - "usb-XVisio_Technology_XVisio_vSLAM_250801DR48FB26001242-video-index0"
            left_camera_type: lumos
            right_camera_serials:
              - "usb-XVisio_Technology_XVisio_vSLAM_250801DR48FB26001173-video-index0"
            right_camera_type: lumos
            left_gripper_type: robotiq
            right_gripper_type: robotiq
            left_gripper_connection: "/dev/serial/by-id/usb-FTDI_USB_TO_RS-485_DAAIT8PU-if00-port0"
            right_gripper_connection: "/dev/serial/by-id/usb-FTDI_USB_TO_RS-485_DAAIR00N-if00-port0"
            left_controller_node_rank: 0
            right_controller_node_rank: 1
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: null
    project_name: rlinf
    experiment_name: "replay-rot6d-model-dual-franka"
    logger_backends: ["tensorboard"]

env:
  group_name: "EnvGroup"
  eval:
    use_gello: False
    use_gello_joint: False
    use_spacemouse: False
    keyboard_reward_wrapper: null
    auto_reset: False
    ignore_terminations: True
    max_episode_steps: 100000
    override_cfg:
      task_description: "model-driven replay (rot6d TCP)"
      success_hold_steps: 1
      target_ee_pose:
        - [0.5, -0.2, 0.4, -3.14, 0.0, 0.0]
        - [0.5,  0.2, 0.4, -3.14, 0.0, 0.0]
      reset_ee_pose:
        - [0.5, -0.2, 0.5, -3.14, 0.0, 0.0]
        - [0.5,  0.2, 0.5, -3.14, 0.0, 0.0]
      joint_reset_qpos:
        - [-0.058, 0.075, -0.309, -1.623, -0.012, 2.387, 0.016]
        - [-0.520, 0.160,  0.748, -1.526,  0.031, 1.978, -0.425]

actor:
  seed: 1234
  model:
    # cylinder-handover 4.28-only rot6d_v1 SFT, step 46000 (post md5 verify)
    model_path: /home/i-yinuo/cynws/RLinf/checkpoints/dual_franka_cylinder_handover_4_28_rot6d_v1/global_step_46000/
    precision: bfloat16
    num_action_chunks: 20
    action_dim: 20
    add_value_head: False
    openpi:
      config_name: "pi05_dualfranka_rot6d"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}
    openpi_data:
      repo_id: "YinuoTHU/Dual-franka-cylinder-handover-20260428"
