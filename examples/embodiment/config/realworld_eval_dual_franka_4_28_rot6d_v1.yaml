defaults:
  - env/realworld_franka_rot6d_dual@env.train
  - env/realworld_franka_rot6d_dual@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: franka
      placement: 0
    rollout:
      node_group: franka
      placement: 0
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0-1
      # actor/rollout/env (placement: 0 → node0) run under .venv-openpi;
      # FrankyController falls under default "cluster" group → keeps node-local .venv.
      env_configs:
        - node_ranks: 0
          python_interpreter_path: /home/i-yinuo/cynws/RLinf/.venv-openpi/bin/python
      hardware:
        type: DualFranka
        configs:
          - left_robot_ip: "172.16.0.2"
            right_robot_ip: "172.16.0.2"
            base_camera_serials:
              - "941322072906"
            base_camera_type: realsense
            left_camera_serials:
              - "usb-XVisio_Technology_XVisio_vSLAM_250801DR48FB26001242-video-index0"
            left_camera_type: lumos
            right_camera_serials:
              - "usb-XVisio_Technology_XVisio_vSLAM_250801DR48FB26001173-video-index0"
            right_camera_type: lumos
            left_gripper_type: robotiq
            right_gripper_type: robotiq
            left_gripper_connection: "/dev/serial/by-id/usb-FTDI_USB_TO_RS-485_DAAIT8PU-if00-port0"
            right_gripper_connection: "/dev/serial/by-id/usb-FTDI_USB_TO_RS-485_DAAIR00N-if00-port0"
            left_controller_node_rank: 0
            right_controller_node_rank: 1
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: dual-franka-openpi
    experiment_name: "realworld-eval-dual-franka-4_28-rot6d-v1"
    wandb_entity: striding-algo
    logger_backends: ["tensorboard"]
  max_epochs: 100
  max_steps: 100
  only_eval: True
  val_check_interval: -1

algorithm:
  update_epoch: 1
  group_size: 1
  eval_rollout_epoch: 100
  adv_type: gae
  loss_type: actor  # eval-only; any non-critic loss avoids the value-head assertion
  sampling_params:
    # OPENPI is flow-matching: HF worker rewrites kwargs to {"mode": "eval"}
    # before predict_action_batch (huggingface_worker.py:264-268), so these
    # LLM sampling fields don't reach pi05. Real determinism is enforced in
    # huggingface_worker.predict() — when mode=="eval" and model_type==OPENPI,
    # torch RNG is reseeded with actor.seed per call so same obs → same chunk.
    # Keep these fields as-is (HF setup_sample_params dict-accesses them).
    do_sample: False
    temperature_train: 1.0
    temperature_eval: 0.0
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  eval:
    # Disable GELLO teleop intervention for autonomous policy rollout.
    use_gello_joint: False
    use_gello: False
    use_spacemouse: False
    # No keyboard-gated recording during eval — just let the policy act.
    keyboard_reward_wrapper: eval_control
    max_episode_steps: 10000
    max_steps_per_rollout_epoch: 10000
    override_cfg:
      # Reverted to null (full 20-step chunk per inference) after exec=1
      # produced "barely moves" behavior. Reason: dataconfig sets
      # extra_delta_transform=True so the model internally learns SE(3)
      # body-frame deltas, recovered to absolute via state ⊗ delta at
      # output_transform. With chunk_size=1 the dispatched absolute[0] is
      # always ~current state (delta[0] is one-step-tiny), tracker has no
      # error to track, robot doesn't move. The 20-step chunk works because
      # absolute[0..19] spans ~30cm so the impedance tracker has a
      # forward-running target sequence to chase.
      exec_chunk_steps: null
      task_description: "pick up the cylinder with the left hand, hand it over to the right hand, and place it on the plate"
      # SFT model outputs absolute TCP-pose target [xyz(3), rot6d(6), grip(1)]
      # per arm (20-d total, matches Dual-franka-rot6d dataset). Per env.step
      # the decoded pose is pushed into a franky CartesianImpedanceTracker
      # (see DualFrankaRot6dEnv._dispatch_arm_motion).
      #
      # Autonomous reset starts from the training-data first-frame joint
      # distribution so the policy's initial obs is in-distribution. Values
      # are per-joint means over 74 episodes from
      #   logs/merged_dual_franka_cylinder_handover_20260428/
      # — the dataset this 4/28-only ckpt was trained on. Joints diverge
      # ~7-20° from the 4/24 dataset mean despite near-identical TCP xyz
      # (Franka null-space gives many joint configs for one TCP), so the
      # wrist-camera viewpoint shifts noticeably; re-using the 4/24 values
      # pushes the policy off-distribution at t=0.
      # IMPORTANT: re-compute whenever the SFT dataset changes.
      joint_reset_qpos:
        - [ 0.224, 0.041, -0.579, -1.744, -0.366, 2.586,  0.312]
        - [-0.445, 0.125,  0.622, -1.565,  0.260, 1.988, -0.553]
      # Training-data first-frame TCP (xyz mean over the 74 eps above).
      # Euler orientation is a coarse down-pointing approximation; the real
      # gripper orientation used by reset is recovered from FK on the joints
      # above, so these xyz values are the load-bearing ones.
      target_ee_pose:
        - [0.654, -0.245, 0.564, -3.14, 0.0, 0.0]
        - [0.641,  0.138, 0.523, -3.14, 0.0, 0.0]
      reset_ee_pose:
        - [0.654, -0.245, 0.664, -3.14, 0.0, 0.0]
        - [0.641,  0.138, 0.623, -3.14, 0.0, 0.0]
      success_hold_steps: 1

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  sync_weight_nccl_max_ctas: 32
  model:
    # cylinder-handover 4.28-only rot6d_v1 SFT ckpt (openpi pi05_dualfranka_rot6d,
    # trained on YinuoTHU/Dual-franka-cylinder-handover-20260428, 74 ep / 17052 frames, dual_FR3).
    # Layout:
    #   <model_path>/actor/model_state_dict/full_weights.pt
    #   <model_path>/YinuoTHU/Dual-franka-cylinder-handover-20260428/norm_stats.json
    # Source on zx2 (4.28 SFT, step 14000):
    #   /mnt/public/chenyinuo/RLinf/logs/20260429-04:14:07/dual_franka_cylinder_handover_4_28_rot6d_v1/checkpoints/global_step_14000
    # norm_stats from /mnt/public/chenyinuo/RLinf/assets/pi05_dualfranka_rot6d/YinuoTHU/Dual-franka-cylinder-handover-20260428/norm_stats.json
    model_path: /home/i-yinuo/cynws/RLinf/checkpoints/dual_franka_cylinder_handover_4_28_rot6d_v1/global_step_46000/
    precision: ${actor.model.precision}

critic:
  use_critic_model: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: False
  model:
    model_path: ${rollout.model.model_path}
    precision: null
    num_action_chunks: 20          # matches SFT action_horizon
    action_dim: 20                 # dual-franka rot6d: [L_xyz, L_rot6d, L_grip, R_xyz, R_rot6d, R_grip]
    add_value_head: False
    openpi:
      config_name: "pi05_dualfranka_rot6d"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}
    # Override the dataconfig's default repo_id (YinuoTHU/Dual-franka-rot6d) so
    # asset_id resolves to the SFT dataset and norm_stats are read from
    # <model_path>/YinuoTHU/Dual-franka-cylinder-handover-20260428/norm_stats.json.
    # Both actor.model_provider_func and the HF rollout init_worker copy
    # `actor.model` and call `get_model`, so openpi_data must live here.
    openpi_data:
      repo_id: "YinuoTHU/Dual-franka-cylinder-handover-20260428"
