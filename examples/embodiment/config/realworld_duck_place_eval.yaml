defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: franka
      placement: 0
    rollout:
      node_group: franka
      placement: 0
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0
      hardware:
        type: Franka
        configs:
          - robot_ip: ROBOT_IP
            node_rank: 0
            controller_node_rank: CONTROLLER_NODE_RANK
            camera_type: CAMERA_TYPE
            camera_serials: ["CAMERA_SERIAL1", "CAMERA_SERIAL2", "CAMERA_SERIAL3"]
            gripper_type: GRIPPER_TYPE
            gripper_connection: GRIPPER_CONNECTION
    - label: nuc
      node_ranks: 1
      env_configs:
        - node_ranks: 1
          python_interpreter_path: /path/to/python

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld-duck-place-eval"
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  enable_drq: True
  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.01
  critic_actor_ratio: 2
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  train: &duck_place_env
    env_type: realworld
    total_num_envs: 1
    auto_reset: False
    ignore_terminations: False
    reward_mode: raw
    wrap_obs_mode: simple
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: False
    max_steps_per_rollout_epoch: 300
    max_episode_steps: 300
    use_spacemouse: False
    main_image_key: wrist_1
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    init_params:
      id: "DataCollectSFTEnv-v1"
      num_envs: null
    override_cfg:
      is_dummy: false
      task_description: TASK_DESCRIPTION
      target_ee_pose: [0.53, -0.07, 0.2, 3.12, 0.19, 0.24]
      reset_ee_pose: [0.53, -0.07, 0.3, 3.12, 0.19, 0.24]
      use_dense_reward: false
      max_num_steps: 300
      step_frequency: 10.0
      reward_threshold: [0.01, 0.01, 0.01, 0.2, 0.2, 0.2]
      binary_gripper_threshold: 0.5
      success_hold_steps: 1
      enable_random_reset: false
      enable_gripper_penalty: false
      action_scale: [1.0, 1.0, 1.0]
      ee_pose_limit_min: [0.42, -0.19, 0.15, 2.60, -0.33, -0.50]
      ee_pose_limit_max: [0.62, 0.18, 0.35, 3.64, 0.71, 0.67]
  eval:
    <<: *duck_place_env

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  sync_weight_nccl_max_ctas: 32
  model:
    model_path: "/path/to/model/openpi"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 256
  seed: 1234
  enable_offload: True
  model:
    # Keep a minimal actor-model scaffold because current config validation and
    # worker initialization still read actor.* even in runner.only_eval mode.
    model_path: ${rollout.model.model_path}
    num_action_chunks: 4
    action_dim: 7
    add_value_head: True
    openpi:
      config_name: "pi0_realworld_pnp"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}
