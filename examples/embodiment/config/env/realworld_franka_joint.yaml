env_type: realworld

total_num_envs: 1

auto_reset: False
ignore_terminations: False
reward_mode: raw
wrap_obs_mode: simple
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 300
max_episode_steps: 300
use_spacemouse: False
use_gello: False
use_gello_joint: True
use_relative_frame: False  # Not applicable for joint-space control
no_gripper: False
gello_port: "/dev/serial/by-id/your-gello-serial-port"  # Replace with your GELLO serial port
main_image_key: wrist_1

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/eval

init_params:
  id: "FrankaJointEnv-v1"
  num_envs: null

override_cfg:
  is_dummy: false
  # Replace with your task description.
  task_description: "pick up the object and place it into the container"
  # Joint action mode: "absolute" for direct GELLO mapping, "delta" for RL training.
  joint_action_mode: "absolute"
  # Scaling factor for delta mode (rad per unit action). Ignored in absolute mode.
  joint_action_scale: 0.1
  # Conservative joint velocity limit (rad/s per joint) for safety.
  joint_velocity_limit: 0.5
  # Replace with your goal pose [x, y, z, rx, ry, rz] used by success checking.
  target_ee_pose: [0.5, 0.0, 0.1, -3.14, 0.0, 0.0]
  # Replace with your reset pose [x, y, z, rx, ry, rz].
  reset_ee_pose: [0.5, 0.0, 0.2, -3.14, 0.0, 0.0]
  max_num_steps: 300
  # Position success tolerance [x, y, z, rx, ry, rz].
  reward_threshold: [0.01, 0.01, 0.01, 0.2, 0.2, 0.2]
  enable_gripper_penalty: false
  # [xyz delta scale, rpy delta scale, gripper scale]. gripper scale is still used.
  action_scale: [1.0, 1.0, 1.0]
  # Workspace clip box (Cartesian). Used for safety even in joint-space mode.
  ee_pose_limit_min: [0.4, -0.2, 0.05, -3.64, -0.5, -0.5]
  ee_pose_limit_max: [0.6, 0.2, 0.35, -2.64, 0.5, 0.5]
  # Robotiq gripper serial port — must be set for FrankyController.
  gripper_type: robotiq
  gripper_connection: /dev/ttyUSB0  # Replace with your Robotiq serial port
