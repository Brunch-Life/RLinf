defaults:
  - env/realworld_data_collect@env.eval
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# ── Two-node split deployment ────────────────────────────────────
#   node 0 (server, 22.04): GPU + 3× ZED cameras  →  env worker
#   node 1 (NUC,    20.04): Franka arm + Robotiq   →  FrankaController
#
# Start Ray:
#   server:  RLINF_NODE_RANK=0 ray start --head --port=6379
#   NUC:     RLINF_NODE_RANK=1 ray start --address=<server_ip>:6379
# ─────────────────────────────────────────────────────────────────
cluster:
  num_nodes: 2
  component_placement:
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0           # server — env worker runs here (ZED cameras)
      hardware:
        type: Franka
        configs:
          - robot_ip: 172.16.0.2            # Franka arm IP (reachable from server)
            node_rank: 0                    # hardware enumeration on server
            controller_node_rank: 1         # FrankaController on NUC
            camera_type: "zed"
            camera_serials:                 # Replace with your ZED serial numbers
              - "10848563"
              - "39651335"
              - "34303972"
            gripper_type: "robotiq"
            gripper_connection: "/dev/ttyUSB0"   # Robotiq USB-RS485 on NUC
    - label: nuc
      node_ranks: 1           # NUC — FrankaController runs here
      env_configs:
        - node_ranks: 1
          python_interpreter_path: /home/franka/cynws/RLinf/.venv/bin/python3  # Replace

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "collect-data-zed-robotiq"
    logger_backends: ["tensorboard"]
  num_data_episodes: 50
  export_format: "lerobot"
  robot_type: "panda"
  fps: 10
  only_success: True

env:
  group_name: "EnvGroup"
  eval:
    no_gripper: False
    ignore_terminations: False
    auto_reset: False
    use_spacemouse: False
    use_gello: True
    override_cfg:
      target_ee_pose: [0.53, -0.07, 0.2, 3.12, 0.19, 0.24]  # Replace with your task pose
