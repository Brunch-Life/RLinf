defaults:
  - env/realworld_dual_franka@env.eval
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0-1
      hardware:
        type: DualFranka
        configs:
          - left_robot_ip: LEFT_FRANKA_IP        # Replace with your left Franka IP
            right_robot_ip: RIGHT_FRANKA_IP      # Replace with your right Franka IP
            left_camera_serials:
              - "ZED_SERIAL_LEFT"                 # Replace with your left ZED serial
            right_camera_serials:
              - "ZED_SERIAL_RIGHT"                # Replace with your right ZED serial
            camera_type: zed
            left_controller_node_rank: 0          # Left arm controller on Machine A
            right_controller_node_rank: 1         # Right arm controller on Machine B
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: null    # Replace with your log path
    project_name: rlinf
    experiment_name: "collect-data-dual-franka"
    logger_backends: ["tensorboard"]
  num_data_episodes: 20
  record_task_description: False

env:
  group_name: "EnvGroup"
  eval:
    no_gripper: False
    ignore_terminations: False
    auto_reset: False
    use_spacemouse: False
    use_dual_spacemouse: True
    override_cfg:
      target_ee_pose:
        - [0.5, -0.2, 0.1, -3.14, 0.0, 0.0]    # Replace with your left arm target
        - [0.5,  0.2, 0.1, -3.14, 0.0, 0.0]    # Replace with your right arm target
      success_hold_steps: 1

  data_collection:
    enabled: True
    save_dir: ${runner.logger.log_path}/collected_data
    export_format: "lerobot"
    only_success: True
    robot_type: "dual_panda"
    fps: 10
