defaults:
  - env/realworld_dual_franka@env.eval
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    env:
      node_group: franka
      placement: 0
  node_groups:
    - label: franka
      node_ranks: 0-1
      hardware:
        type: DualFranka
        configs:
          - left_robot_ip: 172.16.0.2        # Replace with your left Franka IP
            right_robot_ip: 172.16.0.2      # Replace with your right Franka IP
            left_camera_serials:
              - "141722079447"                  # Replace with your left RealSense serial
            right_camera_serials:
              - "141722078696"                 # Replace with your right RealSense serial
            camera_type: realsense
            left_gripper_type: robotiq
            right_gripper_type: robotiq
            left_gripper_connection: "/dev/ttyUSB0"    # RS-485 on Node 0
            right_gripper_connection: "/dev/ttyUSB1"   # RS-485 on Node 1
            left_controller_node_rank: 0          # Left arm controller on Machine A
            right_controller_node_rank: 1         # Right arm controller on Machine B
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: null    # Replace with your log path
    project_name: rlinf
    experiment_name: "collect-data-dual-franka"
    logger_backends: ["tensorboard"]
  num_data_episodes: 20
  record_task_description: False

env:
  group_name: "EnvGroup"
  eval:
    no_gripper: False
    ignore_terminations: False
    auto_reset: False
    use_spacemouse: False
    use_dual_spacemouse: False
    use_dual_gello: True
    gello_joint_control: True
    left_gello_port: "/dev/serial/by-id/usb-FTDI_USB__-__Serial_Converter_FTAJEDPC-if00-port0"
    right_gello_port: "/dev/serial/by-id/usb-FTDI_USB__-__Serial_Converter_FTAM5DHY-if00-port0"
    left_zmq_host: "192.168.120.43"
    right_zmq_host: "192.168.120.42"
    left_zmq_port: 5555
    right_zmq_port: 5555
    gello_joint_control_hz: 100
    override_cfg:
      target_ee_pose:
        - [0.5, -0.2, 0.1, -3.14, 0.0, 0.0]    # Replace with your left arm target
        - [0.5,  0.2, 0.1, -3.14, 0.0, 0.0]    # Replace with your right arm target
      success_hold_steps: 1

  data_collection:
    enabled: True
    save_dir: ${runner.logger.log_path}/collected_data
    export_format: "lerobot"
    only_success: True
    robot_type: "dual_panda"
    fps: 10
