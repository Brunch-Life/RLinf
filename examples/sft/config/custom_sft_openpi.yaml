defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-3

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: dual-franka-openpi
    experiment_name: "test_openpi"
    wandb_entity: striding-algo
    logger_backends: ["wandb"] # tensorboard, swanlab

  max_epochs: 100000
  max_steps: -1
  val_check_interval: -1
  save_interval: 500

data:
  train_data_paths: "/mnt/public1/chenyinuo/RLinf/datasets/collected_data"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 128
  seed: 0

  # Override the default values in model/pi0
  model:
    precision: null
    model_path: "/mnt/public1/chenyinuo/RLinf/models/pi05/torch"
    action_dim: 16 # dual-franka: [L7joints, L_grip, R7joints, R_grip]
    num_action_chunks: 20 # interface for the env; matches Pi0Config action_horizon
    add_value_head: False
    openpi:
      config_name: "pi05_dualfranka"
      detach_critic_input: True

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False