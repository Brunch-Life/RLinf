defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# Dual-Franka cylinder-handover SFT — joint-space, 4.28 dataset.
#   - config_name: pi05_dualfranka_joint
#   - 16-d state/action [L_jpos(7), L_grip(1), R_jpos(7), R_grip(1)]
#   - Absolute joint targets, no delta transform
#   - Trains directly on the GELLO-side joint command stream (no backfill)
#   - Task dataset: YinuoTHU/Dual-franka-cylinder-handover-20260428
#     (74 episodes, 17052 frames, dual_FR3, fps 10) — same 4.28 raw used
#     before the rot6d backfill, picked up directly via repo_id.

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-7

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: dual-franka-openpi
    experiment_name: "dual_franka_cylinder_handover_4_28_joint_v1"
    wandb_entity: striding-algo
    logger_backends: ["wandb"]

  max_epochs: 100000
  max_steps: -1
  val_check_interval: -1
  save_interval: 2000

data:
  train_data_paths: "/mnt/public/chenyinuo/datasets/collected_data"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 128
  seed: 0

  model:
    precision: null
    model_path: "/mnt/public/chenyinuo/RLinf/models/pi05/torch"
    action_dim: 16 # dual-franka joint: [L_jpos(7), L_grip(1), R_jpos(7), R_grip(1)]
    num_action_chunks: 16 # matches Pi0Config action_horizon
    add_value_head: False
    openpi:
      config_name: "pi05_dualfranka_joint"
      detach_critic_input: True
    openpi_data:
      repo_id: ${actor.openpi_data.repo_id}

  openpi_data:
    repo_id: "YinuoTHU/Dual-franka-cylinder-handover-20260428"

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
