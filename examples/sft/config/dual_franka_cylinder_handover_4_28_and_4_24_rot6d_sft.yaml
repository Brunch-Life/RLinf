defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# Dual-Franka cylinder-handover SFT — TCP / rot6d_v1, 4.28+4.24 merged.
#   - config_name: pi05_dualfranka_rot6d
#   - 20-d state/action [xyz + rot6d + grip] per arm
#   - Task dataset: YinuoTHU/Dual-franka-cylinder-handover-20260424-and-20260428
#     (154 episodes total; 80 from 4.24 dual_panda + 74 from 4.28 dual_FR3,
#      30155 frames, fps 10)

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-7

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: dual-franka-openpi
    experiment_name: "dual_franka_cylinder_handover_4_28_and_4_24_rot6d_v1"
    wandb_entity: striding-algo
    logger_backends: ["wandb"]

  max_epochs: 100000
  max_steps: -1
  val_check_interval: -1
  save_interval: 2000

data:
  train_data_paths: "/mnt/public/chenyinuo/datasets/collected_data"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 128
  seed: 0

  model:
    precision: null
    model_path: "/mnt/public/chenyinuo/RLinf/models/pi05/torch"
    action_dim: 20
    num_action_chunks: 20
    add_value_head: False
    openpi:
      config_name: "pi05_dualfranka_rot6d"
      detach_critic_input: True
    openpi_data:
      repo_id: ${actor.openpi_data.repo_id}

  openpi_data:
    repo_id: "YinuoTHU/Dual-franka-cylinder-handover-20260424-and-20260428"

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
