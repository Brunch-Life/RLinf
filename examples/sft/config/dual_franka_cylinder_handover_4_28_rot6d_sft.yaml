defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# Dual-Franka cylinder-handover SFT — TCP / rot6d_v1 layout, 4.28 dataset only.
#   - config_name: pi05_dualfranka_rot6d
#   - 20-d state/action [xyz + rot6d + grip] per arm
#   - Body-frame SE(3) RigidBodyDeltaActions at training time (no euler wrap)
#   - Task dataset: YinuoTHU/Dual-franka-cylinder-handover-20260428
#     (74 episodes, 17052 frames, dual_FR3, fps 10)
#
# Before launching (already done if the prep pipeline ran):
#   - backfill 4.28 raw → rot6d:
#       python toolkits/dual_franka/backfill_rot6d.py \
#           --src datasets/merged_dual_franka_cylinder_handover_20260428 \
#           --dst datasets/collected_data/YinuoTHU/Dual-franka-cylinder-handover-20260428
#   - calculate norm_stats:
#       python toolkits/lerobot/calculate_norm_stats.py \
#           --config-name pi05_dualfranka_rot6d \
#           --repo-id YinuoTHU/Dual-franka-cylinder-handover-20260428
#   - copy norm_stats into model assets dir:
#       cp assets/pi05_dualfranka_rot6d/YinuoTHU/Dual-franka-cylinder-handover-20260428/norm_stats.json \
#          <model_path>/YinuoTHU/Dual-franka-cylinder-handover-20260428/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-7

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: dual-franka-openpi
    experiment_name: "dual_franka_cylinder_handover_4_28_rot6d_v1"
    wandb_entity: striding-algo
    logger_backends: ["wandb"]

  max_epochs: 100000
  max_steps: -1
  val_check_interval: -1
  save_interval: 2000

data:
  # train_vla_sft.py forces this into HF_LEROBOT_HOME, so it MUST be the
  # LeRobot root dir (not a repo-specific subdir). The actual dataset is
  # resolved as HF_LEROBOT_HOME/<actor.openpi_data.repo_id>.
  train_data_paths: "/mnt/public/chenyinuo/datasets/collected_data"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 128
  seed: 0

  model:
    precision: null
    model_path: "/mnt/public/chenyinuo/RLinf/models/pi05/torch"
    action_dim: 20 # dual-franka rot6d: [L_xyz, L_rot6d, L_grip, R_xyz, R_rot6d, R_grip]
    num_action_chunks: 20 # matches Pi0Config action_horizon
    add_value_head: False
    openpi:
      config_name: "pi05_dualfranka_rot6d"
      detach_critic_input: True
    # NOTE: openpi_data must also be placed under actor.model.* for the
    # get_model() path (rlinf/models/embodiment/openpi/__init__.py reads
    # cfg.openpi_data where cfg = actor.model). The fsdp_vla_sft_worker
    # data-loader path reads it from actor.openpi_data instead, so we mirror
    # the same value via OmegaConf reference.
    openpi_data:
      repo_id: ${actor.openpi_data.repo_id}

  openpi_data:
    repo_id: "YinuoTHU/Dual-franka-cylinder-handover-20260428"

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
